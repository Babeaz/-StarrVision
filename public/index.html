<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarrVision — Brawl Stars Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root {
  --c1: #FF6B35;
  --c2: #FFD23F;
  --c3: #06BCC1;
  --c4: #9B5DE5;
  --bg: #0D0E14;
  --bg2: #13141C;
  --bg3: #1A1B26;
  --bg4: #21222F;
  --border: rgba(255,255,255,0.07);
  --text: #F0F0F8;
  --muted: #6B6C80;
  --green: #2ECC71;
  --red: #E74C3C;
  --r: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,107,53,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 50% at 85% 90%, rgba(155,93,229,0.07) 0%, transparent 60%); }
nav { position:sticky; top:0; z-index:100; background: rgba(13,14,20,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display:flex; align-items:center; padding: 0 1.5rem; }
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 3px; padding: 0.9rem 1.5rem 0.9rem 0; margin-right: 0.5rem; background: linear-gradient(135deg, var(--c1), var(--c2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; border-right: 1px solid var(--border); }
.nav-tab { padding: 0.9rem 1rem; cursor:pointer; color:var(--muted); font-size:0.82rem; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; border-bottom: 2px solid transparent; transition: all 0.2s; white-space:nowrap; }
.nav-tab:hover { color:var(--text); }
.nav-tab.active { color:var(--c1); border-bottom-color:var(--c1); }
main { position:relative; z-index:1; padding: 1.5rem; max-width: 1280px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.page-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:2px; background: linear-gradient(135deg, var(--text), var(--muted)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.page-sub { color:var(--muted); font-size:0.85rem; margin-top:0.2rem; margin-bottom:1.5rem; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem; }
.card-accent { border-color: rgba(255,107,53,0.25); background: linear-gradient(135deg, rgba(255,107,53,0.03), var(--bg2)); }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; align-items:start; }
.g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
.g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
.field { display:flex; flex-direction:column; gap:0.35rem; margin-bottom:1rem; }
.field label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; }
.tag-wrap { position:relative; }
.tag-prefix { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:1rem; color:var(--c1); pointer-events:none; z-index:2; }
.tag-wrap input { padding-left: 28px !important; }
input, select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 0.65rem 1rem; border-radius: 8px; font-family:'Barlow',sans-serif; font-size:0.9rem; transition: border-color 0.2s, box-shadow 0.2s; width:100%; }
input:focus, select:focus { outline:none; border-color: rgba(255,107,53,0.5); box-shadow: 0 0 0 3px rgba(255,107,53,0.08); }
input::placeholder { color: var(--muted); }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:0.5rem; padding: 0.7rem 1.5rem; border-radius:8px; border:none; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.95rem; letter-spacing:1px; text-transform:uppercase; transition: all 0.2s; width:100%; }
.btn-p { background: linear-gradient(135deg, var(--c1), #ff8c42); color:#fff; }
.btn-p:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,107,53,0.3); }
.btn-s { background: linear-gradient(135deg, var(--c3), #05a8ad); color:#fff; }
.btn-s:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(6,188,193,0.3); }
.btn-g { background:transparent; border:1px solid var(--border); color:var(--muted); width:auto; padding:0.45rem 0.9rem; font-size:0.78rem; }
.btn-g:hover { border-color:var(--c1); color:var(--c1); }
.stat-box { background:var(--bg3); border-radius:8px; padding:1rem; text-align:center; border:1px solid var(--border); transition: transform 0.2s, border-color 0.2s; }
.stat-box:hover { transform:translateY(-2px); border-color:rgba(255,107,53,0.3); }
.sval { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--c2); letter-spacing:1px; }
.slbl { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-top:0.15rem; }
.prof-hero { display:flex; align-items:center; gap:1.25rem; padding-bottom:1.25rem; margin-bottom:1.25rem; border-bottom:1px solid var(--border); }
.prof-av { width:68px; height:68px; border-radius:50%; background: linear-gradient(135deg, var(--c1), var(--c4)); display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; box-shadow: 0 0 0 3px var(--bg2), 0 0 0 4px rgba(255,107,53,0.3); }
.prof-name { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:1px; line-height:1; }
.prof-tag { color:var(--muted); font-size:0.8rem; font-family:monospace; margin-top:0.25rem; }
.badges { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.5rem; }
.badge { padding:0.2rem 0.6rem; border-radius:20px; font-size:0.7rem; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.5px; text-transform:uppercase; }
.bo { background:rgba(255,107,53,0.15); color:var(--c1); border:1px solid rgba(255,107,53,0.3); }
.bt { background:rgba(6,188,193,0.12); color:var(--c3); border:1px solid rgba(6,188,193,0.3); }
.bp { background:rgba(155,93,229,0.15); color:#b47aff; border:1px solid rgba(155,93,229,0.3); }
.by { background:rgba(255,210,63,0.12); color:var(--c2); border:1px solid rgba(255,210,63,0.3); }
.fav-btn { background:none; border:none; cursor:pointer; font-size:1.2rem; padding:0.3rem; border-radius:6px; transition:transform 0.2s; line-height:1; }
.fav-btn:hover { transform:scale(1.2); }
.chips { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.6rem; }
.chip { display:inline-flex; align-items:center; gap:0.4rem; background:var(--bg3); border:1px solid var(--border); border-radius:20px; padding:0.28rem 0.7rem; font-size:0.76rem; cursor:pointer; transition:all 0.15s; font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:0.5px; }
.chip:hover { border-color:var(--c1); color:var(--c1); }
.chip-fav { border-color:rgba(255,210,63,0.25); }
.chip-fav:hover { border-color:var(--c2); color:var(--c2); }
.chip-x { color:var(--muted); font-size:0.65rem; cursor:pointer; margin-left:0.1rem; }
.chip-x:hover { color:var(--red); }
.slabel { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-weight:700; margin-bottom:0.4rem; display:block; }
.btable { width:100%; border-collapse:collapse; }
.btable th { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; padding:0.5rem 0.75rem; text-align:left; border-bottom:1px solid var(--border); font-weight:700; }
.btable td { padding:0.6rem 0.75rem; font-size:0.88rem; border-bottom:1px solid rgba(255,255,255,0.03); }
.btable tr:hover td { background:rgba(255,107,53,0.03); }
.btable tr:last-child td { border:none; }
.chart-wrap { height:240px; position:relative; margin-top:1rem; }
.hlog { max-height:140px; overflow-y:auto; background:var(--bg); border-radius:8px; padding:0.6rem; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; }
.hlog-e { padding:0.12rem 0; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--green); }
.hlog-e:last-child { border:none; }
.race-card { background:var(--bg3); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; margin-bottom:0.75rem; transition: border-color 0.2s; }
.race-card.ldr { border-color:rgba(255,210,63,0.3); }
.race-head { padding:0.9rem 1.1rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
.race-bar-wrap { padding:0.9rem 1.1rem; }
.race-track { height:22px; background:var(--bg); border-radius:11px; overflow:hidden; border:1px solid var(--border); }
.race-fill { height:100%; border-radius:11px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-size:0.7rem; font-weight:700; font-family:'Barlow Condensed',sans-serif; transition: width 1s cubic-bezier(.4,0,.2,1); min-width:36px; }
.rf1 { background:linear-gradient(90deg,#FFD23F,#ffb300); color:#000; }
.rf2 { background:linear-gradient(90deg,#06BCC1,#0597a0); color:#fff; }
.rf3 { background:linear-gradient(90deg,#9B5DE5,#7a3fc2); color:#fff; }
.rf4 { background:linear-gradient(90deg,#2ECC71,#25a259); color:#fff; }
.rnum { font-family:'Bebas Neue',sans-serif; font-size:2rem; line-height:1; }
.r1{color:var(--c2);} .r2{color:var(--c3);} .r3{color:var(--c4);} .r4{color:var(--green);}
.lead-pill { background:rgba(255,210,63,0.15); color:var(--c2); border:1px solid rgba(255,210,63,0.35); padding:0.2rem 0.6rem; border-radius:20px; font-size:0.7rem; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.5px; text-transform:uppercase; animation: glow 2s infinite; }
@keyframes glow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px 2px rgba(255,210,63,0.15)} }
.qtargets { display:flex; flex-wrap:wrap; gap:0.35rem; margin-bottom:0.75rem; }
.qt { background:var(--bg4); border:1px solid var(--border); color:var(--muted); padding:0.25rem 0.55rem; border-radius:5px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.75rem; letter-spacing:0.5px; transition:all 0.15s; }
.qt:hover { border-color:rgba(255,107,53,0.4); color:var(--c1); }
.qt.active { border-color:var(--c1); color:var(--c1); background:rgba(255,107,53,0.08); }
.calc-result { display:none; background:var(--bg3); border:1px solid rgba(46,204,113,0.2); border-radius:var(--r); padding:1.25rem; margin-top:1.25rem; }
.calc-result.show { display:block; animation:fadeIn 0.3s ease; }
.calc-big { font-family:'Bebas Neue',sans-serif; font-size:4rem; color:var(--green); line-height:1; letter-spacing:2px; }
.mode-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:0.6rem; margin-top:0.6rem; }
.mcard { background:var(--bg3); border:2px solid var(--border); border-radius:8px; padding:0.65rem; cursor:pointer; text-align:center; transition:all 0.15s; }
.mcard:hover { border-color:rgba(255,107,53,0.35); }
.mcard.sel { border-color:var(--c1); background:rgba(255,107,53,0.05); }
.micon { font-size:1.4rem; margin-bottom:0.2rem; }
.mname { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.5px; }
.mgain { font-size:0.66rem; color:var(--green); margin-top:0.1rem; }
.bg-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:0.75rem; }
.bcard { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:1rem; cursor:pointer; transition:all 0.2s; text-align:center; position:relative; overflow:hidden; }
.bcard:hover { border-color:rgba(255,107,53,0.35); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.bemoji { font-size:2.2rem; margin-bottom:0.5rem; display:block; }
.bname { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.95rem; text-transform:uppercase; letter-spacing:0.5px; }
.bcls { font-size:0.68rem; color:var(--muted); margin-top:0.15rem; }
.tpill { display:inline-block; margin-top:0.4rem; padding:0.15rem 0.5rem; border-radius:4px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.68rem; letter-spacing:0.5px; }
.ts { background:rgba(255,210,63,0.15); color:var(--c2); }
.ta { background:rgba(6,188,193,0.12); color:var(--c3); }
.build-detail { display:none; background:var(--bg3); border:1px solid rgba(255,210,63,0.2); border-radius:var(--r); padding:1.5rem; margin-top:1.25rem; }
.build-detail.show { display:block; animation:fadeIn 0.3s ease; }
.bsec h4 { font-size:0.66rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-weight:700; margin-bottom:0.55rem; }
.bitem { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:0.7rem; margin-bottom:0.45rem; display:flex; gap:0.7rem; align-items:flex-start; }
.biico { font-size:1.35rem; flex-shrink:0; }
.biname { font-weight:600; font-size:0.86rem; font-family:'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:0.5px; }
.biwhy { font-size:0.73rem; color:var(--muted); margin-top:0.12rem; line-height:1.4; }
.btip { background:rgba(6,188,193,0.06); border:1px solid rgba(6,188,193,0.2); border-radius:8px; padding:0.7rem; font-size:0.78rem; color:var(--c3); line-height:1.5; margin-top:0.6rem; }
.swrap { position:relative; margin-bottom:1.25rem; }
.swrap input { padding-left:2.5rem !important; }
.sico { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:var(--muted); }
.loader { display:none; align-items:center; gap:0.6rem; color:var(--muted); font-size:0.83rem; padding:0.5rem 0; }
.loader.show { display:flex; }
.spin { width:15px; height:15px; border:2px solid var(--border); border-top-color:var(--c1); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.err { display:none; background:rgba(231,76,60,0.08); border:1px solid rgba(231,76,60,0.25); border-radius:8px; padding:0.6rem 0.9rem; font-size:0.8rem; color:#ff7675; margin-top:0.6rem; }
.err.show { display:block; }
.div { height:1px; background:var(--border); margin:1rem 0; }
.mt1{margin-top:1rem;} .mt075{margin-top:0.75rem;} .mt05{margin-top:0.5rem;} .mb1{margin-bottom:1rem;} .mb075{margin-bottom:0.75rem;}
.fx{display:flex;} .gc{gap:0.5rem;} .g075{gap:0.75rem;} .g1{gap:1rem;} .aic{align-items:center;} .jb{justify-content:space-between;}
::-webkit-scrollbar{width:4px;height:4px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr;}nav{overflow-x:auto;}main{padding:1rem;}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">STARR·VISION</div>
  <div class="nav-tab active" onclick="goTo('tracker',this)">📊 Tracker</div>
  <div class="nav-tab" onclick="goTo('race',this)">🏁 Race</div>
  <div class="nav-tab" onclick="goTo('calc',this)">🎯 Calculateur</div>
  <div class="nav-tab" onclick="goTo('builds',this)">⚔️ Builds</div>
</nav>
<main>

<section class="section active" id="s-tracker">
  <div class="page-title">Tracker de Joueur</div>
  <div class="page-sub">Recherche n'importe quel joueur par son tag</div>
  <div class="g2">
    <div>
      <div class="card card-accent">
        <div class="field">
          <label>Tag du joueur</label>
          <div class="tag-wrap"><span class="tag-prefix">#</span><input type="text" id="trackerTag" placeholder="2PP, ABCDEF..." onkeydown="if(event.key==='Enter')fetchPlayer()" /></div>
        </div>
        <button class="btn btn-p" onclick="fetchPlayer()">🔍 Rechercher</button>
        <div class="loader mt075" id="tLoad"><div class="spin"></div>Connexion...</div>
        <div class="err" id="tErr"></div>
        <div class="div"></div>
        <span class="slabel">⭐ Favoris</span>
        <div class="chips" id="favChips"><span style="color:var(--muted);font-size:0.76rem">Aucun favori — clique ★ après une recherche</span></div>
        <div style="margin-top:0.9rem">
          <span class="slabel">🕐 Recherches récentes</span>
          <div class="chips" id="histChips"><span style="color:var(--muted);font-size:0.76rem">Aucune recherche récente</span></div>
        </div>
        <div class="div"></div>
        <span class="slabel">📈 Suivi auto</span>
        <p style="font-size:0.74rem;color:var(--muted);margin-bottom:0.5rem">Enregistre les trophées toutes les minutes</p>
        <div class="fx gc aic">
          <button class="btn btn-g" onclick="startTrack()" id="btnStart">▶ Démarrer</button>
          <button class="btn btn-g" onclick="stopTrack()" id="btnStop" style="display:none">⏹ Arrêter</button>
        </div>
        <div class="hlog mt05" id="hlog"><div style="color:var(--muted)">Aucun enregistrement...</div></div>
      </div>
    </div>
    <div id="profWrap" style="display:none">
      <div class="card card-accent">
        <div class="prof-hero">
          <div class="prof-av" id="pAv">🤖</div>
          <div style="flex:1">
            <div class="fx jb aic">
              <div class="prof-name" id="pName">—</div>
              <button class="fav-btn" id="favBtn" onclick="toggleFav()" title="Ajouter aux favoris">☆</button>
            </div>
            <div class="prof-tag" id="pTag">—</div>
            <div class="badges" id="pBadges"></div>
          </div>
        </div>
        <div class="g4" id="pStats"></div>
      </div>
      <div class="card mt1">
        <div class="fx jb aic mb1" style="margin-bottom:0.5rem">
          <span class="slabel" style="margin:0">Évolution des trophées</span>
          <span style="font-size:0.7rem;color:var(--muted)" id="chartInfo">—</span>
        </div>
        <div class="chart-wrap"><canvas id="tChart"></canvas></div>
      </div>
      <div class="card mt1">
        <span class="slabel">Top Brawlers</span>
        <table class="btable">
          <thead><tr><th>#</th><th>Brawler</th><th>Trophées</th><th>Rang</th><th>Puissance</th></tr></thead>
          <tbody id="btbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<section class="section" id="s-race">
  <div class="page-title">Race Mode</div>
  <div class="page-sub">Compare plusieurs joueurs vers un objectif commun</div>
  <div class="g2">
    <div class="card card-accent">
      <div id="racePlayers">
        <div class="field"><label>Joueur 1</label><div class="tag-wrap"><span class="tag-prefix">#</span><input type="text" placeholder="TAG_J1" class="rtag" onkeydown="if(event.key==='Enter')runRace()" /></div></div>
        <div class="field"><label>Joueur 2</label><div class="tag-wrap"><span class="tag-prefix">#</span><input type="text" placeholder="TAG_J2" class="rtag" onkeydown="if(event.key==='Enter')runRace()" /></div></div>
      </div>
      <button class="btn btn-g mb1" style="width:auto" onclick="addRaceP()">+ Ajouter un joueur</button>
      <div class="field"><label>🏆 Objectif</label><input type="number" id="rTarget" value="50000" /></div>
      <div class="qtargets">
        <span style="font-size:0.66rem;color:var(--muted);width:100%;text-transform:uppercase;letter-spacing:1px">Raccourcis</span>
        <button class="qt" onclick="setT(10000)">10K</button><button class="qt" onclick="setT(20000)">20K</button><button class="qt" onclick="setT(30000)">30K</button><button class="qt" onclick="setT(40000)">40K</button><button class="qt" onclick="setT(50000)">50K</button><button class="qt" onclick="setT(60000)">60K</button><button class="qt" onclick="setT(70000)">70K</button><button class="qt" onclick="setT(80000)">80K</button><button class="qt" onclick="setT(90000)">90K</button><button class="qt" onclick="setT(100000)">100K</button><button class="qt" onclick="setT(125000)">125K</button><button class="qt" onclick="setT(150000)">150K</button><button class="qt" onclick="setT(175000)">175K</button><button class="qt" onclick="setT(200000)">200K</button>
      </div>
      <button class="btn btn-s" onclick="runRace()">🏁 Lancer la course</button>
      <div class="loader mt075" id="rLoad"><div class="spin"></div>Récupération...</div>
      <div class="err" id="rErr"></div>
      <div class="mt1 fx gc aic">
        <button class="btn btn-g" onclick="refreshRace()" id="btnRef" style="display:none">🔄 Actualiser</button>
        <span style="font-size:0.7rem;color:var(--muted)" id="rUpd"></span>
      </div>
    </div>
    <div id="rResults" style="display:none">
      <div class="card mb1">
        <div class="fx jb aic">
          <div><span class="slabel" style="margin:0">Objectif</span><div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--c2)" id="rTargD">—</div></div>
          <div style="text-align:right"><span class="slabel" style="margin:0">Leader</span><div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem" id="rLead">—</div></div>
        </div>
      </div>
      <div id="rList"></div>
    </div>
  </div>
</section>

<section class="section" id="s-calc">
  <div class="page-title">Calculateur de Grind</div>
  <div class="page-sub">Combien de parties pour atteindre ton objectif ?</div>
  <div class="g2">
    <div class="card card-accent">
      <div class="field"><label>Trophées actuels</label><input type="number" id="cCur" placeholder="39000" /></div>
      <div class="field"><label>Objectif</label><input type="number" id="cTgt" placeholder="40000" /></div>
      <div class="field"><label>Taux de victoire (%)</label><input type="number" id="cWR" value="55" min="1" max="100" /></div>
      <span class="slabel">Mode de jeu</span>
      <div class="mode-grid" id="mGrid"></div>
      <button class="btn btn-p mt1" onclick="calc()">Calculer</button>
    </div>
    <div>
      <div class="calc-result" id="cResult">
        <span class="slabel">Victoires nécessaires</span>
        <div class="calc-big" id="cWins">—</div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:0.2rem" id="cMode">—</div>
        <div class="g3 mt1" id="cBreak"></div>
        <div style="margin-top:1rem;background:rgba(46,204,113,0.05);border:1px solid rgba(46,204,113,0.15);border-radius:8px;padding:1rem;font-size:0.83rem;line-height:1.8" id="cSum"></div>
      </div>
      <div class="card mt1" id="cTipsBox" style="display:none">
        <span class="slabel">💡 Conseils</span>
        <div id="cTips" style="font-size:0.8rem;line-height:1.7;color:var(--muted)"></div>
      </div>
    </div>
  </div>
</section>

<section class="section" id="s-builds">
  <div class="page-title">Meilleurs Builds</div>
  <div class="page-sub">Gadget, Pouvoir Star et Gears recommandés</div>
  <div class="swrap"><span class="sico">🔍</span><input type="text" id="bSearch" placeholder="Rechercher... (Shelly, Leon, Spike...)" oninput="filterB()" /></div>
  <div class="bg-grid" id="bGrid"></div>
  <div class="build-detail" id="bDetail">
    <div class="fx jb aic mb1">
      <div class="fx aic g1"><span id="bdEmo" style="font-size:2.5rem"></span><div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px" id="bdName">—</div><div style="font-size:0.76rem;color:var(--muted)" id="bdCls">—</div></div></div>
      <button class="btn btn-g" onclick="document.getElementById('bDetail').classList.remove('show')">✕ Fermer</button>
    </div>
    <div class="g2" id="bdCont"></div>
  </div>
</section>

</main>
<script>
let chartI=null,curPlayer=null,trackInt=null,selMode=null,raceData=[],racePC=2;
let favs=JSON.parse(localStorage.getItem('sv_f')||'[]');
let hist=JSON.parse(localStorage.getItem('sv_h')||'[]');
let trHist=JSON.parse(localStorage.getItem('sv_t')||'{}[]').replace('[]','{}')||{};

function goTo(id,el){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('s-'+id).classList.add('active');el.classList.add('active');}
function clean(v){return v.replace(/^#+/,'').trim().toUpperCase();}
function full(v){const c=clean(v);return c?'#'+c:'';}
async function apicall(p){const r=await fetch('/api'+p);if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||e.reason||'Erreur '+r.status);}return r.json();}
async function fetchPlayer(){const raw=document.getElementById('trackerTag').value.trim();if(!raw)return;const tag=full(raw);if(!tag)return;sh('tLoad');hi('tErr');document.getElementById('profWrap').style.display='none';try{const d=await apicall('/players/'+encodeURIComponent(tag));curPlayer=d;renderProf(d);document.getElementById('profWrap').style.display='block';recTr(tag,d.trophies);addHist(tag,d.name);updFavBtn(tag);}catch(e){shErr('tErr',e.message);}finally{hi('tLoad');}}
function renderProf(d){document.getElementById('pAv').textContent=temo(d.name);document.getElementById('pName').textContent=d.name||'—';document.getElementById('pTag').textContent=d.tag||'—';const b=document.getElementById('pBadges');b.innerHTML='';if(d.club?.name)b.innerHTML+='<span class="badge bt">🏟 '+d.club.name+'</span>';if(d.highestTrophies)b.innerHTML+='<span class="badge by">⭐ Record: '+d.highestTrophies.toLocaleString()+'</span>';document.getElementById('pStats').innerHTML='<div class="stat-box"><div class="sval">'+( d.trophies||0).toLocaleString()+'</div><div class="slbl">🏆 Trophées</div></div><div class="stat-box"><div class="sval">'+( d['3vs3Victories']||0).toLocaleString()+'</div><div class="slbl">⚔️ 3v3</div></div><div class="stat-box"><div class="sval">'+( d.soloVictories||0).toLocaleString()+'</div><div class="slbl">👤 Solo</div></div><div class="stat-box"><div class="sval">'+( d.expLevel||0)+'</div><div class="slbl">⚡ XP</div></div>';renderBrawlers(d.brawlers||[]);renderChart(d.tag,d.trophies);}
function renderBrawlers(brs){const s=[...brs].sort((a,b)=>b.trophies-a.trophies).slice(0,10);document.getElementById('btbody').innerHTML=s.map((b,i)=>'<tr><td style="color:var(--muted);font-family:Bebas Neue,sans-serif;font-size:1.1rem">'+( i+1)+'</td><td style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.88rem;text-transform:uppercase">'+b.name+'</td><td><span style="color:var(--c2)">🏆</span> '+b.trophies.toLocaleString()+'</td><td>'+'⭐'.repeat(Math.min(b.rank||1,5))+'</td><td><span class="badge bp">P'+b.power+'</span></td></tr>').join('');}
function renderChart(tag,cur){const h=trHist[tag]||[];if(chartI)chartI.destroy();const ctx=document.getElementById('tChart').getContext('2d');const labs=h.length>1?h.map(x=>new Date(x.ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})):['Avant','Maintenant'];const vals=h.length>1?h.map(x=>x.v):[cur-50,cur];chartI=new Chart(ctx,{type:'line',data:{labels:labs,datasets:[{data:vals,borderColor:'#FF6B35',backgroundColor:'rgba(255,107,53,0.08)',borderWidth:2,pointBackgroundColor:'#FF6B35',pointRadius:3,fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6B6C80',maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#6B6C80'},grid:{color:'rgba(255,255,255,0.04)'}}}}});document.getElementById('chartInfo').textContent=h.length+' point(s)';}
function toggleFav(){if(!curPlayer)return;const tag=curPlayer.tag,name=curPlayer.name,idx=favs.findIndex(f=>f.tag===tag);if(idx>=0)favs.splice(idx,1);else{favs.unshift({tag,name});if(favs.length>10)favs.pop();}localStorage.setItem('sv_f',JSON.stringify(favs));updFavBtn(tag);renderFavs();}
function updFavBtn(tag){const b=document.getElementById('favBtn'),iF=favs.some(f=>f.tag===tag);b.textContent=iF?'★':'☆';b.style.color=iF?'var(--c2)':''';}
function renderFavs(){const w=document.getElementById('favChips');if(!favs.length){w.innerHTML='<span style="color:var(--muted);font-size:0.74rem">Aucun favori</span>';return;}w.innerHTML=favs.map(f=>'<span class="chip chip-fav" onclick="loadChip(\'''+f.tag+'\'')">⭐ '+f.name+'<span class="chip-x" onclick="event.stopPropagation();rmFav(\'''+f.tag+'\'')">✕</span></span>').join('');}
function rmFav(tag){favs=favs.filter(f=>f.tag!==tag);localStorage.setItem('sv_f',JSON.stringify(favs));renderFavs();if(curPlayer?.tag===tag)updFavBtn(tag);}
function addHist(tag,name){hist=hist.filter(h=>h.tag!==tag);hist.unshift({tag,name});if(hist.length>8)hist.pop();localStorage.setItem('sv_h',JSON.stringify(hist));renderHist();}
function renderHist(){const w=document.getElementById('histChips');if(!hist.length){w.innerHTML='<span style="color:var(--muted);font-size:0.74rem">Aucune recherche récente</span>';return;}w.innerHTML=hist.map(h=>'<span class="chip" onclick="loadChip(\'''+h.tag+'\'')">🕐 '+h.name+'<span class="chip-x" onclick="event.stopPropagation();rmHist(\'''+h.tag+'\'')">✕</span></span>').join('');}
function rmHist(tag){hist=hist.filter(h=>h.tag!==tag);localStorage.setItem('sv_h',JSON.stringify(hist));renderHist();}
function loadChip(tag){document.getElementById('trackerTag').value=clean(tag);fetchPlayer();}
function recTr(tag,v){if(!trHist[tag])trHist[tag]=[];trHist[tag].push({ts:Date.now(),v});if(trHist[tag].length>200)trHist[tag]=trHist[tag].slice(-200);localStorage.setItem('sv_t',JSON.stringify(trHist));const l=document.getElementById('hlog'),t=new Date().toLocaleTimeString('fr-FR'),e=document.createElement('div');e.className='hlog-e';e.textContent='['+t+'] '+tag+' → '+v.toLocaleString()+' 🏆';l.insertBefore(e,l.firstChild);if(l.children.length>20)l.removeChild(l.lastChild);}
function startTrack(){if(!curPlayer){alert('Cherche d\'abord un joueur !');return;}document.getElementById('btnStart').style.display='none';document.getElementById('btnStop').style.display='inline-flex';const tag=curPlayer.tag;trackInt=setInterval(async()=>{try{const d=await apicall('/players/'+encodeURIComponent(tag));recTr(tag,d.trophies);renderChart(tag,d.trophies);}catch(e){}},60000);}
function stopTrack(){clearInterval(trackInt);document.getElementById('btnStart').style.display='inline-flex';document.getElementById('btnStop').style.display='none';}
const RFS=['rf1','rf2','rf3','rf4'];
function addRaceP(){if(racePC>=4)return;racePC++;const d=document.createElement('div');d.className='field';d.innerHTML='<label>Joueur '+racePC+'</label><div class="tag-wrap"><span class="tag-prefix">#</span><input type="text" placeholder="TAG_J'+racePC+'" class="rtag" onkeydown="if(event.key===\'Enter\')runRace()" /></div>';document.getElementById('racePlayers').appendChild(d);}
function setT(v){document.getElementById('rTarget').value=v;document.querySelectorAll('.qt').forEach(b=>{const n=parseInt(b.textContent)*1000;b.classList.toggle('active',n===v);});}
async function runRace(){const tags=[...document.querySelectorAll('.rtag')].map(i=>full(i.value)).filter(Boolean);if(tags.length<2){shErr('rErr','Ajoute au moins 2 tags !');return;}const tgt=parseInt(document.getElementById('rTarget').value)||50000;sh('rLoad');hi('rErr');document.getElementById('rResults').style.display='none';try{raceData=await Promise.all(tags.map(async(tag,i)=>{const d=await apicall('/players/'+encodeURIComponent(tag));return{tag,name:d.name,trophies:d.trophies,rf:RFS[i]};}));renderRace(raceData,tgt);document.getElementById('btnRef').style.display='inline-flex';document.getElementById('rUpd').textContent='Mis à jour '+new Date().toLocaleTimeString('fr-FR');}catch(e){shErr('rErr',e.message);}finally{hi('rLoad');}}
function renderRace(ps,tgt){const s=[...ps].sort((a,b)=>b.trophies-a.trophies),ldr=s[0];document.getElementById('rTargD').textContent=tgt.toLocaleString()+' 🏆';document.getElementById('rLead').textContent=ldr.name;document.getElementById('rResults').style.display='block';document.getElementById('rList').innerHTML=s.map((p,i)=>{const pct=Math.min((p.trophies/tgt)*100,100),rem=Math.max(tgt-p.trophies,0),done=p.trophies>=tgt;return'<div class="race-card '+( i===0?'ldr':'')+'"><div class="race-head"><div class="fx aic g075"><div class="rnum r'+( i+1)+'">#'+(i+1)+'</div><div><div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1.05rem;text-transform:uppercase">'+p.name+'</div><div style="font-size:0.7rem;color:var(--muted);font-family:monospace">'+ p.tag+'</div></div></div><div class="fx aic g075">'+(done?'<span class="lead-pill">✅ Objectif</span>':(i===0?'<span class="lead-pill">👑 En tête</span>':'')+'</div></div><div style="font-family:Bebas Neue,sans-serif;font-size:1.4rem;color:var(--c2)">')+p.trophies.toLocaleString()+'</div></div></div><div class="race-bar-wrap"><div class="race-track"><div class="race-fill '+p.rf+'" style="width:'+ Math.max(pct,3)+'%">'+ Math.round(pct)+'%</div></div><div class="fx jb mt05" style="font-size:0.73rem;color:var(--muted)">'+(done?'<span style="color:var(--green)">🎉 Objectif atteint !</span>':`<span>Reste <strong style="color:var(--text)">${rem.toLocaleString()}</strong> trophées</span>`)+(i>0?`<span style="color:var(--red)">−${(ldr.trophies-p.trophies).toLocaleString()} vs ${ldr.name}</span>`:'')+'</div></div></div>';}).join('');}
async function refreshRace(){const tgt=parseInt(document.getElementById('rTarget').value)||50000;if(!raceData.length)return;sh('rLoad');try{const u=await Promise.all(raceData.map(async p=>{const d=await apicall('/players/'+encodeURIComponent(p.tag));return{...p,trophies:d.trophies};}));raceData=u;renderRace(u,tgt);document.getElementById('rUpd').textContent='Mis à jour '+new Date().toLocaleTimeString('fr-FR');}catch(e){shErr('rErr',e.message);}finally{hi('rLoad');}}
const MODES=[{n:'Brawl Ball',i:'⚽',g:8,l:-4},{n:'Gem Grab',i:'💎',g:9,l:-5},{n:'Showdown',i:'☠️',g:6,l:-2},{n:'Heist',i:'💰',g:9,l:-4},{n:'Bounty',i:'🌟',g:8,l:-4},{n:'Hot Zone',i:'🔥',g:9,l:-5},{n:'Knockout',i:'🥊',g:8,l:-4}];
function initModes(){document.getElementById('mGrid').innerHTML=MODES.map((m,i)=>'<div class="mcard '+(i===0?'sel':'')+'" onclick="pickM('+i+')"><div class="micon">'+ m.i+'</div><div class="mname">'+ m.n+'</div><div class="mgain">+'+ m.g+' victoire</div></div>').join('');selMode=MODES[0];}
function pickM(i){document.querySelectorAll('.mcard').forEach((c,j)=>c.classList.toggle('sel',i===j));selMode=MODES[i];}
function calc(){const cur=parseInt(document.getElementById('cCur').value),tgt=parseInt(document.getElementById('cTgt').value),wr=Math.min(Math.max(parseInt(document.getElementById('cWR').value)||55,1),100)/100;if(!cur||!tgt||cur>=tgt){alert('Vérifie les valeurs !');return;}if(!selMode){alert('Choisis un mode !');return;}const gap=tgt-cur,m=selMode,wn=Math.ceil(gap/m.g),net=wr*m.g+(1-wr)*m.l,tot=net>0?Math.ceil(gap/net):9999,los=Math.max(tot-Math.ceil(tot*wr),0),hrs=(tot*4/60).toFixed(1);document.getElementById('cWins').textContent=wn.toLocaleString();document.getElementById('cMode').textContent='victoires en '+m.n+' à +'+m.g+' trophées';document.getElementById('cBreak').innerHTML='<div class="stat-box"><div class="sval">'+tot.toLocaleString()+'</div><div class="slbl">Parties totales</div></div><div class="stat-box"><div class="sval">'+hrs+'h</div><div class="slbl">Temps estimé</div></div><div class="stat-box"><div class="sval" style="color:var(--red)">'+los.toLocaleString()+'</div><div class="slbl">Défaites est.</div></div>';document.getElementById('cSum').innerHTML='🎯 De <strong style="color:var(--c2)">'+cur.toLocaleString()+'</strong> à <strong style="color:var(--c2)">'+tgt.toLocaleString()+'</strong> — il manque <strong style="color:var(--c3)">'+gap.toLocaleString()+' trophées</strong><br>'+ m.i+' En <strong>'+m.n+'</strong> avec <strong style="color:var(--green)">'+ Math.round(wr*100)+'%</strong> de victoires → environ <strong style="color:var(--c2)">'+tot.toLocaleString()+' parties</strong><br>🏆 Si tu ne fais que gagner : <strong>'+wn+'</strong> victoires d\'affilée';document.getElementById('cResult').classList.add('show');document.getElementById('cTipsBox').style.display='block';document.getElementById('cTips').innerHTML='<p>• Joue en soirée pour de meilleurs coéquipiers.</p><p>• 3 défaites d\'affilée ? Change de brawler ou mode.</p><p>• En '+m.n+', adapte ton brawler à la carte.</p><p>• Pause toutes les 10 parties.</p>';}
const BUILDS=[{n:'Shelly',e:'👩',c:'Tireur',t:'S',g:{n:'Pigeon d\'argile',i:'🕊️',w:'Éjecte les ennemis proches.'},s:{n:'Pansement',i:'🩹',w:'Regen après chaque élim.'},gs:[{n:'Vitesse',i:'💨',w:'Mobilité pour approcher.'},{n:'Bouclier',i:'🛡️',w:'Absorbe les dégâts.'}],tip:'Reste dans l\'herbe, utilise le Super pour effacer les murs.'},{n:'Colt',e:'🤠',c:'Tireur',t:'A',g:{n:'Chargeur rapide',i:'🔫',w:'Burst de dégâts instantané.'},s:{n:'Steady Hands',i:'🎯',w:'Meilleure précision.'},gs:[{n:'Dégâts',i:'⚡',w:'Booste le DPS.'},{n:'Vitesse',i:'💨',w:'Repositionnement.'}],tip:'Excelle en Bounty et Heist. Reste à longue portée.'},{n:'Leon',e:'🦁',c:'Assassin',t:'S',g:{n:'Clone Léon',i:'🌀',w:'Leurre pour la fuite.'},s:{n:'Camouflage',i:'🫥',w:'Invisible plus longtemps.'},gs:[{n:'Vitesse',i:'💨',w:'Approche et fuite rapides.'},{n:'Dégâts',i:'⚡',w:'Burst max en sortie d\'invis.'}],tip:'Cible les supports. Jamais en terrain découvert.'},{n:'Spike',e:'🌵',c:'Légendaire',t:'S',g:{n:'Super piques',i:'🌵',w:'Zone de contrôle instantanée.'},s:{n:'Fertilisant',i:'🌱',w:'Regen dans la zone du Super.'},gs:[{n:'Gadget Charge',i:'⚡',w:'Dépendant de son gadget.'},{n:'Bouclier',i:'🛡️',w:'Compense sa faiblesse défensive.'}],tip:'En Gem Grab, quasi imbattable. Contrôle le centre.'},{n:'Sandy',e:'😴',c:'Mythique',t:'S',g:{n:'Tempête de sable',i:'🏜️',w:'Endort les ennemis proches.'},s:{n:'Sable mouvant',i:'🌊',w:'Accélère les alliés dans la brume.'},gs:[{n:'Vitesse',i:'💨',w:'Repositionnement constant.'},{n:'Vision',i:'👁️',w:'Détecte dans l\'herbe.'}],tip:'Support n°1. En Brawl Ball, couvre l\'avance avec le Super.'},{n:'Mortis',e:'🧛',c:'Assassin',t:'A',g:{n:'Pelle rapide',i:'⚰️',w:'Distance de sécurité ou finisher.'},s:{n:'Seigneur des ténèbres',i:'🌑',w:'Vol de vie — survie assurée.'},gs:[{n:'Vitesse',i:'💨',w:'Incontrôlable.'},{n:'Dégâts',i:'⚡',w:'Burst sur les fragiles.'}],tip:'Contre Barley, Spike, Pam. Évite Frank et El Primo.'},{n:'Frank',e:'🔨',c:'Tank',t:'A',g:{n:'Battre le sol',i:'💥',w:'Dégâts de zone + interruption.'},s:{n:'Hardy Hardy',i:'🪨',w:'Réduit les étourdissements.'},gs:[{n:'Bouclier',i:'🛡️',w:'Optimise le rôle tank.'},{n:'Dégâts',i:'⚡',w:'Pression en mêlée.'}],tip:'Meilleur tank en Siege. Utilise le Super pour bloquer.'},{n:'Piper',e:'🌹',c:'Tireur',t:'A',g:{n:'Parapluie',i:'☂️',w:'Fuite instantanée + mines.'},s:{n:'Expert en pression',i:'🎠',w:'Mines au saut plus puissantes.'},gs:[{n:'Vitesse',i:'💨',w:'Se repositionne en permanence.'},{n:'Bouclier',i:'🛡️',w:'Survit si surprise.'}],tip:'En Bounty, mortelle. Fuis Mortis avec le gadget.'}];
let filtB=[...BUILDS];
function initBuilds(){renderBG(BUILDS);}
function renderBG(list){document.getElementById('bGrid').innerHTML=list.map((b)=>'<div class="bcard" onclick="showB('+BUILDS.indexOf(b)+')"><span class="bemoji">'+ b.e+'</span><div class="bname">'+ b.n+'</div><div class="bcls">'+ b.c+'</div><div class="tpill t'+ b.t.toLowerCase()+'">Tier '+ b.t+'</div></div>').join('');}
function filterB(){const q=document.getElementById('bSearch').value.toLowerCase();filtB=BUILDS.filter(b=>b.n.toLowerCase().includes(q)||b.c.toLowerCase().includes(q));renderBG(filtB);}
function showB(i){const b=BUILDS[i];document.getElementById('bdEmo').textContent=b.e;document.getElementById('bdName').textContent=b.n;document.getElementById('bdCls').textContent=b.c+' · Tier '+b.t;document.getElementById('bdCont').innerHTML='<div><div class="bsec mb075"><h4>🔧 Gadget</h4><div class="bitem"><div class="biico">'+ b.g.i+'</div><div><div class="biname">'+ b.g.n+'</div><div class="biwhy">'+ b.g.w+'</div></div></div></div><div class="bsec"><h4>⭐ Pouvoir Star</h4><div class="bitem"><div class="biico">'+ b.s.i+'</div><div><div class="biname">'+ b.s.n+'</div><div class="biwhy">'+ b.s.w+'</div></div></div></div></div><div><div class="bsec mb075"><h4>⚙️ Gears</h4>'+b.gs.map(g=>'<div class="bitem"><div class="biico">'+g.i+'</div><div><div class="biname">'+g.n+'</div><div class="biwhy">'+g.w+'</div></div></div>').join('')+'</div><div class="btip">💡 '+b.tip+'</div></div>';document.getElementById('bDetail').classList.add('show');document.getElementById('bDetail').scrollIntoView({behavior:'smooth',block:'nearest'});}
function sh(id){document.getElementById(id).classList.add('show');}
function hi(id){document.getElementById(id).classList.remove('show');}
function shErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
function temo(n){return['🎮','⚡','🔥','💥','🌟','🏆','👑','🎯'][(n||'').charCodeAt(0)%8];}

try{trHist=JSON.parse(localStorage.getItem('sv_t')||'{}')}catch(e){trHist={};}
initModes();initBuilds();renderFavs();renderHist();
<\/script>
</body>
